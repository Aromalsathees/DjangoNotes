<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>


    <div>
        <h1 style="color: red;">The below batman image is a static one ,coz it is directly loaded from an external URL, not from Django media or database</h1>
    <img  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjMJwSAqRjTwAqbD32c1jTQEW7vJdoEf-mNw&s" alt="">

<h1 style="color: green;">The below are dynamic datas , coz its loaded from the backend </h1>
    {% for item in products %}
<div>
    <h2>{{item.product_name}}</h2>
    <p>{{item.product_desc}}</p>
    <h1>{{item.product_price}}</h1>
    <img src="{{item.image.url}}" alt="">
</div>
    {% endfor %}

</body>
